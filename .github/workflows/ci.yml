name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ci-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: xvfb-run -a npm test

      - name: Package VSIX
        run: npx vsce package

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: acp-client-vsix
          path: "*.vsix"
